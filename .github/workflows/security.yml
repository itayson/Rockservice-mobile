name: Supply chain

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "43 4 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan repository with Gitleaks
        uses: gitleaks/gitleaks-action@961680e5305a30eb575f3ddf6bb6b2e265b68f0a # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Detect dependency changes
        id: dependencies
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          files_json="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/files?per_page=100")"
          dependency_files="$(printf '%s' "$files_json" | jq -r '
            .[] |
            select(
              (.filename | test("(^|/)(gradle/libs\\.versions\\.toml|gradle-wrapper\\.properties|gradle\\.lockfile|settings\\.gradle(\\.kts)?)$")) or
              (
                (.filename | test("(^|/)build\\.gradle(\\.kts)?$")) and
                ((.patch // "") | test(
                  "(?m)^[+-].*(implementation|api|compileOnly|runtimeOnly|testImplementation|androidTestImplementation|debugImplementation|releaseImplementation|kapt|ksp|classpath)[[:space:]]*(\\(|[[:space:]]+[\\\"\\x27])|^[+-].*(alias[[:space:]]*\\(libs\\.plugins\\.|id[[:space:]]*\\()"
                ))
              )
            ) |
            .filename
          ')"

          if [ -n "$dependency_files" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "files<<EOF"
              printf '%s\n' "$dependency_files"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Block dependency changes in stacked pull requests
        if: github.event.pull_request.base.ref != 'main' && steps.dependencies.outputs.changed == 'true'
        env:
          DEPENDENCY_FILES: ${{ steps.dependencies.outputs.files }}
        run: |
          echo "::error title=Stacked dependency change blocked::Dependency inputs changed in a PR whose base is not main. Retarget after the base branch merges so Dependency Review can evaluate the complete graph."
          printf '%s\n' "$DEPENDENCY_FILES"
          exit 1

      - name: Review dependency changes
        if: github.event.pull_request.base.ref == 'main' && steps.dependencies.outputs.changed == 'true'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5
        with:
          comment-summary-in-pr: on-failure

      - name: Record no dependency changes
        if: steps.dependencies.outputs.changed != 'true'
        run: echo "No dependency changes detected; Dependency Review is not required for this pull request."

      - name: Record stacked pull request limitation
        if: github.event.pull_request.base.ref != 'main' && steps.dependencies.outputs.changed != 'true'
        run: |
          echo "::notice title=Stacked PR dependency guard::No dependency changes detected. Full Dependency Review remains mandatory for future dependency-changing pull requests after they target main."
