name: Supply chain

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "43 4 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Scan repository with Gitleaks
        uses: gitleaks/gitleaks-action@961680e5305a30eb575f3ddf6bb6b2e265b68f0a # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect dependency manifest changes
        id: dependencies
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          changed_files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          dependency_files="$(printf '%s\n' "$changed_files" | grep -E '(^|/)(build\.gradle(\.kts)?|settings\.gradle(\.kts)?|gradle/libs\.versions\.toml|gradle-wrapper\.properties|gradle\.lockfile)$' || true)"
          if [ -n "$dependency_files" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "files<<EOF"
              printf '%s\n' "$dependency_files"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Block dependency changes in stacked pull requests
        if: github.event.pull_request.base.ref != 'main' && steps.dependencies.outputs.changed == 'true'
        env:
          DEPENDENCY_FILES: ${{ steps.dependencies.outputs.files }}
        run: |
          echo "::error title=Stacked dependency change blocked::Dependency manifests changed in a PR whose base is not main. Retarget after the base branch merges so Dependency Review can evaluate the complete graph."
          printf '%s\n' "$DEPENDENCY_FILES"
          exit 1

      - name: Review dependency changes
        if: github.event.pull_request.base.ref == 'main' && steps.dependencies.outputs.changed == 'true'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4

      - name: Record no dependency changes
        if: steps.dependencies.outputs.changed != 'true'
        run: echo "No dependency manifest changes detected; Dependency Review is not required for this pull request."

      - name: Record stacked pull request limitation
        if: github.event.pull_request.base.ref != 'main' && steps.dependencies.outputs.changed != 'true'
        run: |
          echo "::notice title=Stacked PR dependency guard::No dependency manifest changes detected. Full Dependency Review remains mandatory for any dependency-changing PR after it targets main."
