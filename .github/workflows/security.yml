name: Supply chain

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "43 4 * * 1"

permissions:
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan repository with Gitleaks
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            detect --source=/repo --no-banner --redact --exit-code=1

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Review dependency changes
        id: dependency-review
        continue-on-error: true
        uses: actions/dependency-review-action@v4

      - name: Record bootstrap limitation
        if: steps.dependency-review.outcome == 'failure'
        run: |
          echo "::warning::Dependency Review could not compare this first bootstrap PR. Enforce this check after the default branch has a dependency snapshot."
