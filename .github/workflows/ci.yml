name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Install SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "cmake;3.22.1" "ndk;28.2.13676358"

      - name: Verify Gradle wrapper
        run: |
          test -s gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
          ./gradlew --version

      - name: Test, build and lint
        shell: bash
        run: |
          set +e
          ./gradlew --no-daemon --console=plain --stacktrace test :app:assembleDebug lint > gradle-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "Gradle failed with exit code $status. Final diagnostic:"
            tail -n 180 gradle-build.log
            exit "$status"
          fi
          tail -n 60 gradle-build.log

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
