name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install SDK
        run: |
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "cmake;3.22.1" "ndk;28.2.13676358"

      - name: Verify Gradle wrapper
        run: |
          test -s gradle/wrapper/gradle-wrapper.jar
          echo "81a82aaea5abcc8ff68b3dfcb58b3c3c429378efd98e7433460610fecd7ae45f  gradle/wrapper/gradle-wrapper.jar" | sha256sum --check
          chmod +x gradlew
          ./gradlew --version

      - name: Test, build and lint
        shell: bash
        run: |
          set +e
          ./gradlew --no-daemon --console=plain --stacktrace test :app:assembleDebug lint > gradle-build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "Gradle failed with exit code $status. Final diagnostic:"
            tail -n 180 gradle-build.log
            exit "$status"
          fi
          tail -n 60 gradle-build.log

      - name: Upload Gradle diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gradle-diagnostics
          path: gradle-build.log
          if-no-files-found: warn

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
