name: CodeQL

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * 2"

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin, cpp]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Install Android toolchain
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "cmake;3.22.1" "ndk;28.2.13676358"

      - uses: github/codeql-action/init@v3
        with:
          languages: "${{ matrix.language }}"

      - name: Build Android and native modules
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :app:assembleDebug :native-rockchip:assembleDebug :native-image-tools:assembleDebug

      - uses: github/codeql-action/analyze@v3
