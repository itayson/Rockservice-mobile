name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-validate:
    name: Build and validate release candidate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install Android SDK
        run: |
          set -euo pipefail
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "cmake;3.22.1" "ndk;28.2.13676358"

      - name: Verify Gradle wrapper
        run: |
          set -euo pipefail
          test -s gradle/wrapper/gradle-wrapper.jar
          echo "81a82aaea5abcc8ff68b3dfcb58b3c3c429378efd98e7433460610fecd7ae45f  gradle/wrapper/gradle-wrapper.jar" | sha256sum --check
          chmod +x gradlew
          ./gradlew --version

      - name: Validate signing secrets
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for variable in RELEASE_KEYSTORE_BASE64 RELEASE_KEYSTORE_PASSWORD RELEASE_KEY_ALIAS RELEASE_KEY_PASSWORD; do
            if [ -z "${!variable:-}" ]; then
              echo "::error title=Missing release secret::$variable is required for a signed release candidate."
              missing=1
            fi
          done
          exit "$missing"

      - name: Materialize protected keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          umask 077
          keystore="$RUNNER_TEMP/rockservice-release.keystore"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore"
          test -s "$keystore"
          chmod 600 "$keystore"
          echo "ROCKSERVICE_KEYSTORE_PATH=$keystore" >> "$GITHUB_ENV"

      - name: Define release candidate name
        id: naming
        shell: bash
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            basename="rockservice-${GITHUB_REF_NAME}"
          else
            basename="rockservice-manual-${GITHUB_RUN_ID}"
          fi
          echo "basename=$basename" >> "$GITHUB_OUTPUT"

      - name: Test, lint and build signed release APK
        env:
          ROCKSERVICE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          ROCKSERVICE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          ROCKSERVICE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          ROCKSERVICE_REQUIRE_RELEASE_SIGNING: "true"
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --console=plain --stacktrace test lint :app:assembleRelease

      - name: Collect and verify signed APK
        id: artifact
        env:
          RELEASE_BASENAME: ${{ steps.naming.outputs.basename }}
        run: |
          set -euo pipefail
          mapfile -t apks < <(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' -print)
          if [ "${#apks[@]}" -ne 1 ]; then
            echo "::error title=Unexpected release outputs::Expected exactly one release APK, found ${#apks[@]}."
            printf '%s\n' "${apks[@]:-}"
            exit 1
          fi

          mkdir -p dist
          apk="dist/${RELEASE_BASENAME}.apk"
          cp "${apks[0]}" "$apk"

          apksigner_bin="$(command -v apksigner || true)"
          if [ -z "$apksigner_bin" ]; then
            apksigner_bin="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner -print | sort -V | tail -n 1)"
          fi
          test -n "$apksigner_bin"
          "$apksigner_bin" verify --verbose --print-certs "$apk"

          (
            cd dist
            sha256sum "${RELEASE_BASENAME}.apk" > "${RELEASE_BASENAME}.apk.sha256"
          )
          echo "apk=$apk" >> "$GITHUB_OUTPUT"

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: ${{ steps.artifact.outputs.apk }}
          format: cyclonedx-json
          output-file: dist/${{ steps.naming.outputs.basename }}.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest APK build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.artifact.outputs.apk }}

      - name: Upload validated release candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-candidate-${{ github.run_id }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

      - name: Remove temporary keystore
        if: always()
        run: |
          set +e
          keystore="${ROCKSERVICE_KEYSTORE_PATH:-$RUNNER_TEMP/rockservice-release.keystore}"
          if [ -f "$keystore" ]; then
            if command -v shred >/dev/null 2>&1; then
              shred --remove --zero "$keystore"
            else
              rm -f "$keystore"
            fi
          fi

  publish:
    name: Publish validated tag release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: build-validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download validated release candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-candidate-${{ github.run_id }}
          path: dist

      - name: Reverify checksum before publication
        run: |
          set -euo pipefail
          cd dist
          mapfile -t checksums < <(find . -maxdepth 1 -type f -name '*.apk.sha256' -print)
          if [ "${#checksums[@]}" -ne 1 ]; then
            echo "::error title=Invalid release candidate::Expected exactly one APK checksum file."
            exit 1
          fi
          sha256sum --check "${checksums[0]}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" dist/* \
            --verify-tag \
            --generate-notes \
            --title "RockService Mobile $GITHUB_REF_NAME"
