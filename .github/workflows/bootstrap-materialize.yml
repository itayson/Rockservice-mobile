name: Materialize trusted bootstrap

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

jobs:
  materialize:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feat/bootstrap-foundation'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/bootstrap-foundation
          fetch-depth: 0
      - name: Validate and materialize bootstrap
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/chunk-* > /tmp/rockservice-bootstrap.b64
          base64 --decode /tmp/rockservice-bootstrap.b64 > /tmp/rockservice-bootstrap.tar.gz
          echo "7128c59658de9a84a5f213f2cb9b077c3a46f57b395834884e6b40e2df07fc26  /tmp/rockservice-bootstrap.tar.gz" | sha256sum --check
          rm -rf /tmp/rockservice-source
          mkdir -p /tmp/rockservice-source
          tar -xzf /tmp/rockservice-bootstrap.tar.gz -C /tmp/rockservice-source
          rsync -a --delete --exclude='.git/' /tmp/rockservice-source/ "$GITHUB_WORKSPACE/"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "feat: bootstrap secure Android foundation"
          git push origin HEAD:feat/bootstrap-foundation
